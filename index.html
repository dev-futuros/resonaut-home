<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resonaut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #000; }
  video {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .logo {
    position: fixed;
    bottom: 5%; left: 50%;
    transform: translateX(-50%);
    width: clamp(200px, 34vw, 340px);
  }
  .logo img { width: 100%; display: block; }

  /* thin line-art accents — sit over the video, never block clicks */
  .deco {
    position: fixed; inset: 0;
    pointer-events: none;
    color: #000;
    mix-blend-mode: difference;
    color: #fff; /* difference vs video -> luminous edges */
  }
  .deco svg { position: absolute; overflow: visible; }
  .deco [stroke] { stroke: currentColor; fill: none; vector-effect: non-scaling-stroke; }
  .deco [data-dot] { fill: currentColor; stroke: none; }

  .frame { position: absolute; inset: 24px; border: 1px solid currentColor; opacity: 0.35; }

  .dots   { top: 14%; left: 50%; transform: translateX(-50%); opacity: 0.7; }
  .orbit  { display: none; }
</style>
</head>
<body>
  <video src="assets/resonaut_landing_bg.mp4" autoplay loop muted playsinline></video>
  <div class="logo">
    <img src="assets/resonaut-vertical.svg" alt="resonaut synthetics">
  </div>

  <div class="deco">
    <div class="frame"></div>

    <!-- five dots above the logo -->
    <svg class="dots" width="84" height="6" viewBox="0 0 84 6">
      <circle data-dot cx="3"  cy="3" r="2"/>
      <circle data-dot cx="22" cy="3" r="2"/>
      <circle data-dot cx="42" cy="3" r="2"/>
      <circle data-dot cx="62" cy="3" r="2"/>
      <circle data-dot cx="81" cy="3" r="2"/>
    </svg>

    <!-- nested orbit loops, top-right -->
    <svg class="orbit" viewBox="0 0 150 110">
      <g stroke stroke-width="1">
        <rect x="10"  y="35" width="130" height="40" rx="20"/>
        <rect x="24"  y="28" width="102" height="54" rx="27"/>
        <rect x="40"  y="22" width="70"  height="66" rx="33"/>
        <rect x="58"  y="18" width="34"  height="74" rx="17"/>
      </g>
      <circle data-dot cx="75" cy="55" r="2.5"/>
    </svg>
  </div>
</body>
</html>
